# ── Database ─────────────────────────────────────────────────────────────────
# URL is hardcoded for local development. Username and password still come
# from environment variables — set DB_USERNAME and DB_PASSWORD in your
# IntelliJ run configuration or shell.
spring.datasource.url=jdbc:postgresql://localhost:5432/java_dictionary
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# ── Logging ──────────────────────────────────────────────────────────────────
logging.level.root=WARN
logging.level.com.noahparknguyen.javadictionary=DEBUG
logging.level.org.springframework.web=INFO
# Logs every SQL statement — useful locally, never in prod
logging.level.org.hibernate.SQL=DEBUG
# Logs SQL bind parameter values — disable if you see too much noise
logging.level.org.hibernate.orm.jdbc.bind=TRACE
# Write to a local log file in addition to the console
logging.file.name=logs/java-dictionary.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
