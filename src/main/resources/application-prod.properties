# ── Database ─────────────────────────────────────────────────────────────────
# All three values must be set as secrets in your deployment service.
# DB_URL format: jdbc:postgresql://<host>:<port>/<database>
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# ── Logging ──────────────────────────────────────────────────────────────────
# Console only — containers don't persist local files.
# No SQL logging — too noisy and may expose sensitive data.
logging.level.root=WARN
logging.level.com.noahparknguyen.javadictionary=INFO
logging.level.org.springframework.web=WARN
