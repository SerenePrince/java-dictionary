<!DOCTYPE html>
<html lang="en" th:replace="~{layout/base :: layout(~{::content})}"
      xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="content">

    <!-- Back -->
    <div class="mb-4">
        <a class="back-link" th:href="@{/terms}">← All Terms</a>
    </div>

    <!-- Header -->
    <div class="page-header d-flex justify-content-between align-items-start">
        <div>
            <span class="badge mb-3"
                  th:text="${term.experienceLevel.displayName}">
            </span>
            <h1 th:text="${term.name}">Term Name</h1>
        </div>

        <div class="d-flex gap-2 mt-1">
            <a class="btn btn-outline-primary btn-sm"
               th:href="@{/terms/{id}/edit(id=${term.id})}">
                Edit
            </a>
            <form method="post"
                  onsubmit="return confirm('Delete this term?')"
                  th:action="@{/terms/{id}/delete(id=${term.id})}">
                <button class="btn btn-outline-danger btn-sm" type="submit">
                    Delete
                </button>
            </form>
        </div>
    </div>

    <!-- Definitions -->
    <div>

        <div class="definition-block">
            <p class="definition-label">Casual Definition</p>
            <p class="definition-text" th:text="${term.casualDefinition}">
                Casual definition
            </p>
        </div>

        <div class="definition-block">
            <p class="definition-label">Formal Definition</p>
            <p class="definition-text" th:text="${term.formalDefinition}">
                Formal definition
            </p>
        </div>

    </div>

    <!-- Tags -->
    <div class="mt-4" th:unless="${#sets.isEmpty(term.tags)}">
        <p class="definition-label mb-2">Tags</p>
        <div>
            <span class="badge me-1 mb-1"
                  th:each="tag : ${term.tags}"
                  th:text="${tag}">
            </span>
        </div>
    </div>

</div>

</body>
</html>
