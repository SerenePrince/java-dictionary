<!DOCTYPE html>
<html lang="en" th:replace="~{layout/base :: layout(~{::content})}"
      xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="content">

    <!-- Back -->
    <div class="mb-4">
        <a class="back-link" th:href="@{/terms}">← All Terms</a>
    </div>

    <!-- Header -->
    <div class="page-header d-flex justify-content-between align-items-start">
        <div>
            <!-- Level badges for all written definitions -->
            <div class="mb-3">
                <span class="badge me-1"
                      th:each="entry : ${term.definitions}"
                      th:text="${entry.key.displayName}">
                </span>
            </div>
            <h1 th:text="${term.name}">Term Name</h1>
        </div>

        <div class="d-flex gap-2 mt-1">
            <a class="btn btn-outline-primary btn-sm"
               th:href="@{/terms/{id}/edit(id=${term.id})}">
                Edit
            </a>
            <form method="post"
                  onsubmit="return confirm('Delete this term and all its definitions?')"
                  th:action="@{/terms/{id}/delete(id=${term.id})}">
                <button class="btn btn-outline-danger btn-sm" type="submit">Delete</button>
            </form>
        </div>
    </div>

    <!-- Definitions — one block per written level -->
    <div th:each="entry : ${term.definitions}">

        <!-- Level heading -->
        <p class="definition-label mt-4 mb-3" th:text="${entry.key.displayName}">Level</p>

        <div class="definition-block">
            <p class="definition-label">Casual Definition</p>
            <p class="definition-text" th:text="${entry.value.casualDefinition}">Casual definition</p>
        </div>

        <div class="definition-block">
            <p class="definition-label">Formal Definition</p>
            <p class="definition-text" th:text="${entry.value.formalDefinition}">Formal definition</p>
        </div>

        <!-- Tags for this level -->
        <div class="mt-3 mb-4" th:unless="${#sets.isEmpty(entry.value.tags)}">
            <p class="definition-label mb-2">Tags</p>
            <span class="badge me-1 mb-1"
                  th:each="tag : ${entry.value.tags}"
                  th:text="${tag}">
            </span>
        </div>

        <hr class="section-divider">

    </div>

</div>

</body>
</html>
