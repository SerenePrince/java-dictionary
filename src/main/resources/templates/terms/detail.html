<!DOCTYPE html>
<html lang="en" th:replace="~{layout/base :: layout(~{::content})}"
      xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="content">

    <!-- Back -->
    <div class="mb-4">
        <a class="back-link" th:href="@{/terms}">← All Terms</a>
    </div>

    <!-- Header -->
    <div class="page-header d-flex justify-content-between align-items-start">
        <div>
            <h1 th:text="${group.name}">Term Name</h1>
            <p class="subtitle"
               th:text="${#lists.size(group.entries)} + ' definition' + (${#lists.size(group.entries)} != 1 ? 's' : '')">
                1 definition
            </p>
        </div>
        <a class="btn btn-primary btn-sm mt-1" th:href="@{/terms/create}">Add Term</a>
    </div>

    <!-- Entries accordion -->
    <div class="accordion roadmap-accordion" id="termAccordion">

        <div class="accordion-item roadmap-accordion-item"
             th:each="entry, iter : ${group.entries}"
             th:id="'entry-' + ${iter.index}">

            <!-- Accordion header — shows source label -->
            <h2 class="accordion-header">
                <button class="accordion-button roadmap-accordion-button"
                        data-bs-toggle="collapse"
                        type="button"
                        th:attr="data-bs-target='#collapse-' + ${iter.index},
                                 aria-controls='collapse-' + ${iter.index}"
                        th:classappend="${iter.index != 0} ? ' collapsed'"
                        th:aria-expanded="${iter.index == 0} ? 'true' : 'false'">

                    <!-- Manual source -->
                    <span th:if="${entry.manual()}">
                        <span class="badge me-2">Manual</span>
                    </span>

                    <!-- Book source -->
                    <span th:unless="${entry.manual()}">
                        <span class="badge me-2" th:text="${entry.sourceBook()}"></span>
                        <span class="roadmap-entry-name" style="font-size: 0.9rem; font-family: 'Inter', sans-serif; font-weight: 400;"
                              th:text="${entry.sourceChapter()}">
                        </span>
                    </span>

                </button>
            </h2>

            <!-- Accordion body -->
            <div class="accordion-collapse collapse roadmap-accordion-collapse"
                 th:classappend="${iter.index == 0} ? ' show'"
                 th:id="'collapse-' + ${iter.index}">
                <div class="accordion-body roadmap-accordion-body">

                    <!-- Casual Definition -->
                    <div class="definition-block">
                        <p class="definition-label">Casual Definition</p>
                        <p class="definition-text" th:text="${entry.casualDefinition()}">Casual definition</p>
                    </div>

                    <!-- Formal Definition -->
                    <div class="definition-block">
                        <p class="definition-label">Formal Definition</p>
                        <p class="definition-text" th:text="${entry.formalDefinition()}">Formal definition</p>
                    </div>

                    <!-- Tags -->
                    <div class="mt-3 mb-4" th:unless="${#sets.isEmpty(entry.tags())}">
                        <p class="definition-label mb-2">Tags</p>
                        <span class="badge me-1 mb-1"
                              th:each="tag : ${entry.tags()}"
                              th:text="${tag}">
                        </span>
                    </div>

                    <!-- Actions -->
                    <div class="d-flex gap-2 mt-3">
                        <a class="btn btn-outline-primary btn-sm"
                           th:href="@{/terms/{slug}/{id}/edit(slug=${group.slug}, id=${entry.id()})}">
                            Edit
                        </a>
                        <form method="post"
                              onsubmit="return confirm('Delete this definition?')"
                              th:action="@{/terms/{slug}/{id}/delete(slug=${group.slug}, id=${entry.id()})}">
                            <button class="btn btn-outline-danger btn-sm" type="submit">Delete</button>
                        </form>
                    </div>

                </div>
            </div>
        </div>

    </div>

</div>

</body>
</html>
