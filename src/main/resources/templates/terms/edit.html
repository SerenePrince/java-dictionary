<!DOCTYPE html>
<html lang="en" th:replace="~{layout/base :: layout(~{::content})}"
      xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="content">

    <!-- Back -->
    <div class="mb-4">
        <a class="back-link" th:href="@{/terms/{slug}(slug=${slug})}">← Back to Term</a>
    </div>

    <!-- Header -->
    <div class="page-header">
        <h1>Edit Term</h1>
        <p class="subtitle" th:text="'Editing: ' + ${term.name()}">Editing term</p>
    </div>

    <!--
      Source info for book-sourced terms (read-only).
      Manual terms skip this section — all fields are editable.
    -->
    <div class="form-section" th:unless="${term.manual()}">
        <h6 class="mb-4">Source</h6>
        <div class="row g-3">
            <div class="col-12 col-md-6">
                <label class="form-label">Book</label>
                <input class="form-control" disabled th:value="${term.sourceBook()}" type="text">
            </div>
            <div class="col-12 col-md-6">
                <label class="form-label">Chapter</label>
                <input class="form-control" disabled th:value="${term.sourceChapter()}" type="text">
            </div>
        </div>
        <p class="form-text mt-2">
            Source fields are managed by the roadmap and cannot be edited here.
        </p>
    </div>

    <!-- Form -->
    <form method="post"
          th:action="@{/terms/{slug}/{id}/edit(slug=${slug}, id=${term.id()})}"
          th:object="${createTermRequest}">

        <!--
          Manual terms: full term-form fragment (name + definitions + tags).
          Book-sourced terms: definitions only (name and tags are locked).
        -->
        <div th:if="${term.manual()}">
            <div th:replace="~{fragments/term-form :: termFormFields(${createTermRequest.tags})}"></div>
        </div>

        <div th:unless="${term.manual()}">
            <div th:replace="~{fragments/term-form :: definitionsOnly}"></div>
        </div>

        <!-- Actions -->
        <div class="d-flex gap-2 pt-2">
            <button class="btn btn-primary" type="submit">Save Changes</button>
            <a class="btn btn-outline-secondary"
               th:href="@{/terms/{slug}(slug=${slug})}">Cancel</a>
        </div>

    </form>

</div>

</body>
</html>
