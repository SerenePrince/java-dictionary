<!DOCTYPE html>
<html lang="en" th:replace="~{layout/base :: layout(~{::content})}"
      xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="content">

    <!-- Back -->
    <div class="mb-4">
        <a class="back-link" th:href="@{/terms/{id}(id=${term.id})}">← Back to Term</a>
    </div>

    <!-- Header -->
    <div class="page-header">
        <h1>Edit Term</h1>
        <p class="subtitle" th:text="'Editing: ' + ${term.name}">Editing term</p>
    </div>

    <!-- Form bound to updateTermRequest for correct validation binding -->
    <form method="post"
          th:action="@{/terms/{id}/edit(id=${term.id})}"
          th:object="${updateTermRequest}">

        <div th:replace="~{fragments/term-form :: termFormFields(${experienceLevels}, ${updateTermRequest.tags})}"></div>

        <!-- Actions -->
        <div class="d-flex gap-2 pt-2">
            <button class="btn btn-primary" type="submit">Save Changes</button>
            <a class="btn btn-outline-secondary"
               th:href="@{/terms/{id}(id=${term.id})}">
                Cancel
            </a>
        </div>

    </form>

</div>

</body>
</html>
