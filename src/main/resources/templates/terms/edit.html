<!DOCTYPE html>
<html lang="en" th:replace="~{layout/base :: layout(~{::content})}"
      xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="content">

    <!-- Back -->
    <div class="mb-4">
        <a class="back-link" th:href="@{/terms/{id}(id=${term.id})}">← Back to Term</a>
    </div>

    <!-- Header -->
    <div class="page-header">
        <h1>Edit Term</h1>
        <p class="subtitle" th:text="'Editing: ' + ${term.name}">Editing term</p>
    </div>

    <!-- Form bound to updateTermRequest for correct validation binding -->
    <form method="post"
          th:action="@{/terms/{id}/edit(id=${term.id})}"
          th:object="${updateTermRequest}">

        <!-- Basic Info -->
        <div class="form-section">
            <h6 class="mb-4">Basic Information</h6>

            <div class="mb-4">
                <label class="form-label" for="name">Term Name</label>
                <input class="form-control"
                       id="name"
                       th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"
                       th:field="*{name}"
                       type="text">
                <div class="invalid-feedback"
                     th:errors="*{name}"
                     th:if="${#fields.hasErrors('name')}">
                </div>
            </div>

            <div class="mb-0">
                <label class="form-label" for="experienceLevel">Experience Level</label>
                <select class="form-select"
                        id="experienceLevel"
                        th:classappend="${#fields.hasErrors('experienceLevel')} ? 'is-invalid'"
                        th:field="*{experienceLevel}">
                    <option value="">Select a level...</option>
                    <option th:each="level : ${experienceLevels}"
                            th:text="${level.displayName}"
                            th:value="${level}">
                    </option>
                </select>
                <div class="invalid-feedback"
                     th:errors="*{experienceLevel}"
                     th:if="${#fields.hasErrors('experienceLevel')}">
                </div>
            </div>
        </div>

        <!-- Definitions -->
        <div class="form-section">
            <h6 class="mb-4">Definitions</h6>

            <div class="mb-4">
                <label class="form-label" for="casualDefinition">Casual Definition</label>
                <textarea class="form-control"
                          id="casualDefinition"
                          rows="4"
                          th:classappend="${#fields.hasErrors('casualDefinition')} ? 'is-invalid'"
                          th:field="*{casualDefinition}">
                </textarea>
                <div class="invalid-feedback"
                     th:errors="*{casualDefinition}"
                     th:if="${#fields.hasErrors('casualDefinition')}">
                </div>
            </div>

            <div class="mb-0">
                <label class="form-label" for="formalDefinition">Formal Definition</label>
                <textarea class="form-control"
                          id="formalDefinition"
                          rows="4"
                          th:classappend="${#fields.hasErrors('formalDefinition')} ? 'is-invalid'"
                          th:field="*{formalDefinition}">
                </textarea>
                <div class="invalid-feedback"
                     th:errors="*{formalDefinition}"
                     th:if="${#fields.hasErrors('formalDefinition')}">
                </div>
            </div>
        </div>

        <!-- Tags -->
        <div class="form-section">
            <div class="mb-2">
                <label class="form-label" for="tagsInput">Tags</label>
                <input class="form-control"
                       id="tagsInput"
                       placeholder="e.g. OOP, inheritance, polymorphism"
                       th:classappend="${#fields.hasErrors('tags')} ? 'is-invalid'"
                       th:value="${#strings.listJoin(updateTermRequest.tags, ', ')}"
                       type="text">
                <p class="form-text">Separate tags with commas.</p>
            </div>

            <div class="mt-2" id="tagPreview">
                <span class="badge me-1 mb-1"
                      th:each="tag : ${updateTermRequest.tags}"
                      th:text="${tag}">
                </span>
            </div>

            <div id="tagInputs">
                <input name="tags"
                       th:each="tag : ${updateTermRequest.tags}"
                       th:value="${tag}"
                       type="hidden">
            </div>
        </div>

        <!-- Actions -->
        <div class="d-flex gap-2 pt-2">
            <button class="btn btn-primary" type="submit">Save Changes</button>
            <a class="btn btn-outline-secondary"
               th:href="@{/terms/{id}(id=${term.id})}">
                Cancel
            </a>
        </div>

    </form>

</div>

</body>
</html>
