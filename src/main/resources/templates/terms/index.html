<!DOCTYPE html>
<html lang="en" th:replace="~{layout/base :: layout(~{::content})}"
      xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="content">

    <!-- Header -->
    <div class="page-header d-flex justify-content-between align-items-start">
        <div>
            <h1>Java Dictionary</h1>
            <p class="subtitle">Your personal Java interview prep tool.</p>
        </div>
        <a class="btn btn-primary" th:href="@{/terms/create}">Add Term</a>
    </div>

    <!-- Filters -->
    <div class="filter-panel mb-5">
        <form method="get" th:action="@{/terms}">
            <div class="row g-3 align-items-end">

                <!-- Search -->
                <div class="col-12 col-md-4">
                    <label class="form-label" for="search">Search</label>
                    <input class="form-control"
                           id="search"
                           name="search"
                           placeholder="Search terms..."
                           th:value="${search}"
                           type="text">
                </div>

                <!-- Experience Level -->
                <div class="col-12 col-md-3">
                    <label class="form-label" for="experienceLevel">Level</label>
                    <select class="form-select"
                            id="experienceLevel"
                            name="experienceLevel">
                        <option value="">All Levels</option>
                        <option th:each="level : ${experienceLevels}"
                                th:selected="${level == selectedLevel}"
                                th:text="${level.displayName}"
                                th:value="${level}">
                        </option>
                    </select>
                </div>

                <!-- Tag Filter -->
                <div class="col-12 col-md-3">
                    <label class="form-label" for="tag">Tag</label>
                    <input class="form-control"
                           id="tag"
                           name="tag"
                           placeholder="Filter by tag..."
                           th:value="${tag}"
                           type="text">
                </div>

                <!-- Submit -->
                <div class="col-12 col-md-2">
                    <button class="btn btn-primary w-100" type="submit">Filter</button>
                </div>

            </div>
        </form>
    </div>

    <!-- Results Count -->
    <p class="results-count"
       th:text="${#lists.size(terms)} + ' terms'">
        0 terms
    </p>

    <!-- Empty State -->
    <div class="empty-state" th:if="${#lists.isEmpty(terms)}">
        <h5>No terms found.</h5>
        <p>Try adjusting your filters, or add a new term to get started.</p>
        <a class="btn btn-primary mt-3" th:href="@{/terms/create}">Add Term</a>
    </div>

    <!-- Terms Grid -->
    <div class="row g-3" th:unless="${#lists.isEmpty(terms)}">
        <div class="col-12 col-md-6 col-lg-4" th:each="term : ${terms}">

            <div class="term-card h-100">

                <!-- Level Badge -->
                <div class="mb-2">
                    <span class="badge"
                          th:text="${term.experienceLevel.displayName}">
                    </span>
                </div>

                <!-- Title -->
                <p class="term-name" th:text="${term.name}">Term Name</p>

                <!-- Definition -->
                <p class="term-definition" th:text="${term.casualDefinition}">
                    Casual definition
                </p>

                <!-- Tags -->
                <div class="mb-3" th:unless="${#sets.isEmpty(term.tags)}">
                    <span class="badge me-1 mb-1"
                          th:each="tag : ${term.tags}"
                          th:text="${tag}">
                    </span>
                </div>

                <!-- Link -->
                <a class="term-link mt-auto"
                   th:href="@{/terms/{id}(id=${term.id})}">
                    Read →
                </a>

            </div>

        </div>
    </div>

</div>

</body>
</html>
