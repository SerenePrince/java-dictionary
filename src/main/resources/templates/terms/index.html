<!DOCTYPE html>
<html lang="en" th:replace="~{layout/base :: layout(~{::content})}"
      xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="content">

    <!-- Header -->
    <div class="page-header">
        <h1>Java Dictionary</h1>
        <p class="subtitle">Your personal Java interview prep tool.</p>
    </div>

    <!-- Filters -->
    <div class="filter-panel mb-5">
        <form method="get" th:action="@{/terms}">
            <div class="row g-3 align-items-end">

                <!-- Search -->
                <div class="col-12 col-md-4">
                    <label class="form-label" for="search">Search</label>
                    <input class="form-control"
                           id="search"
                           name="search"
                           placeholder="Search terms..."
                           th:value="${search}"
                           type="text">
                </div>

                <!-- Book Filter -->
                <div class="col-12 col-md-3">
                    <label class="form-label" for="book">Source</label>
                    <select class="form-select" id="book" name="book">
                        <option value="">All Sources</option>
                        <option value="manual"
                                th:selected="${selectedBook == 'manual'}">
                            Manual
                        </option>
                        <option th:each="b : ${bookOptions}"
                                th:selected="${b == selectedBook}"
                                th:text="${b}"
                                th:value="${b}">
                        </option>
                    </select>
                </div>

                <!-- Tag Filter -->
                <div class="col-12 col-md-3">
                    <label class="form-label" for="tag">Tag</label>
                    <input class="form-control"
                           id="tag"
                           name="tag"
                           placeholder="Filter by tag..."
                           th:value="${selectedTag}"
                           type="text">
                </div>

                <!-- Submit -->
                <div class="col-12 col-md-2">
                    <button class="btn btn-primary w-100" type="submit">Filter</button>
                </div>

            </div>
        </form>
    </div>

    <!-- Results Count -->
    <p class="results-count" th:text="${#lists.size(groups)} + ' term' + (${#lists.size(groups)} != 1 ? 's' : '')">0 terms</p>

    <!-- Empty State -->
    <div class="empty-state" th:if="${#lists.isEmpty(groups)}">
        <h5>No terms found.</h5>
        <p>Try adjusting your filters, or add a new term to get started.</p>
        <a class="btn btn-primary mt-3" th:href="@{/terms/create}">Add Term</a>
    </div>

    <!-- Term Groups Grid -->
    <div class="row g-3" th:unless="${#lists.isEmpty(groups)}">
        <div class="col-12 col-md-6 col-lg-4" th:each="group : ${groups}">
            <div class="term-card h-100">

                <!-- Term name -->
                <p class="term-name" th:text="${group.name}">Term Name</p>

                <!-- Source badges (manual or per-entry source info) -->
                <div class="mb-2" th:if="${#lists.size(group.entries) == 1}">
                    <span class="badge"
                          th:if="${group.entries[0].manual()}"
                          th:text="'Manual'">
                    </span>
                    <span class="badge"
                          th:unless="${group.entries[0].manual()}"
                          th:text="${group.entries[0].sourceBook()}">
                    </span>
                </div>

                <!-- Multiple sources indicator -->
                <div class="mb-2" th:if="${#lists.size(group.entries) > 1}">
                    <span class="badge" th:text="${#lists.size(group.entries)} + ' sources'"></span>
                </div>

                <!-- Casual definition preview (from first entry) -->
                <p class="term-definition"
                   th:text="${group.entries[0].casualDefinition()}">
                    Definition preview
                </p>

                <!-- Tags (from first entry) -->
                <div class="mb-3"
                     th:unless="${#sets.isEmpty(group.entries[0].tags())}">
                    <span class="badge me-1 mb-1"
                          th:each="tag : ${group.entries[0].tags()}"
                          th:text="${tag}">
                    </span>
                </div>

                <!-- Link -->
                <a class="term-link mt-auto"
                   th:href="@{/terms/{slug}(slug=${group.slug})}">
                    Read →
                </a>

            </div>
        </div>
    </div>

</div>

</body>
</html>
