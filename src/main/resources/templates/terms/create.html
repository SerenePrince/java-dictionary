<!DOCTYPE html>
<html lang="en" th:replace="~{layout/base :: layout(~{::content})}"
      xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="content">

    <!-- Back -->
    <div class="mb-4">
        <a class="back-link" th:href="@{/terms}">← All Terms</a>
    </div>

    <!-- Header -->
    <div class="page-header">
        <h1>Add New Term</h1>
        <p class="subtitle">Add a new Java term to your dictionary.</p>
    </div>

    <!-- Form -->
    <form method="post" th:action="@{/terms/create}" th:object="${createTermRequest}">

        <!-- Basic Info -->
        <div class="form-section">
            <h6 class="mb-4">Basic Information</h6>

            <div class="mb-4">
                <label class="form-label" for="name">Term Name</label>
                <input class="form-control"
                       id="name"
                       placeholder="e.g. Polymorphism"
                       th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"
                       th:field="*{name}"
                       type="text">
                <div class="invalid-feedback"
                     th:errors="*{name}"
                     th:if="${#fields.hasErrors('name')}">
                </div>
            </div>

            <div class="mb-0">
                <label class="form-label" for="experienceLevel">Experience Level</label>
                <select class="form-select"
                        id="experienceLevel"
                        th:classappend="${#fields.hasErrors('experienceLevel')} ? 'is-invalid'"
                        th:field="*{experienceLevel}">
                    <option value="">Select a level...</option>
                    <option th:each="level : ${experienceLevels}"
                            th:text="${level.displayName}"
                            th:value="${level}">
                    </option>
                </select>
                <div class="invalid-feedback"
                     th:errors="*{experienceLevel}"
                     th:if="${#fields.hasErrors('experienceLevel')}">
                </div>
            </div>
        </div>

        <!-- Definitions -->
        <div class="form-section">
            <h6 class="mb-4">Definitions</h6>

            <div class="mb-4">
                <label class="form-label" for="casualDefinition">Casual Definition</label>
                <textarea class="form-control"
                          id="casualDefinition"
                          placeholder="Simple explanation in your own words..."
                          rows="4"
                          th:classappend="${#fields.hasErrors('casualDefinition')} ? 'is-invalid'"
                          th:field="*{casualDefinition}">
                </textarea>
                <div class="invalid-feedback"
                     th:errors="*{casualDefinition}"
                     th:if="${#fields.hasErrors('casualDefinition')}">
                </div>
            </div>

            <div class="mb-0">
                <label class="form-label" for="formalDefinition">Formal Definition</label>
                <textarea class="form-control"
                          id="formalDefinition"
                          placeholder="Technical, interview-ready definition..."
                          rows="4"
                          th:classappend="${#fields.hasErrors('formalDefinition')} ? 'is-invalid'"
                          th:field="*{formalDefinition}">
                </textarea>
                <div class="invalid-feedback"
                     th:errors="*{formalDefinition}"
                     th:if="${#fields.hasErrors('formalDefinition')}">
                </div>
            </div>
        </div>

        <!-- Tags -->
        <div class="form-section">
            <div class="mb-2">
                <label class="form-label" for="tagsInput">Tags</label>
                <input class="form-control"
                       id="tagsInput"
                       placeholder="e.g. OOP, inheritance, polymorphism"
                       th:classappend="${#fields.hasErrors('tags')} ? 'is-invalid'"
                       th:value="${#strings.listJoin(createTermRequest.tags, ', ')}"
                       type="text">
                <p class="form-text">Separate tags with commas (max 10).</p>
                <div class="invalid-feedback"
                     th:errors="*{tags}"
                     th:if="${#fields.hasErrors('tags')}">
                </div>
            </div>

            <div class="mt-2" id="tagPreview">
                <span class="badge me-1 mb-1"
                      th:each="tag : ${createTermRequest.tags}"
                      th:text="${tag}">
                </span>
            </div>

            <div id="tagInputs">
                <input name="tags"
                       th:each="tag : ${createTermRequest.tags}"
                       th:value="${tag}"
                       type="hidden">
            </div>
        </div>

        <!-- Actions -->
        <div class="d-flex gap-2 pt-2">
            <button class="btn btn-primary" type="submit">Save Term</button>
            <a class="btn btn-outline-secondary" th:href="@{/terms}">Cancel</a>
        </div>

    </form>

</div>

</body>
</html>
