<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::content})}">
<body>

<div th:fragment="content">

    <!-- Back -->
    <div class="mb-4">
        <a th:href="@{/terms}" class="back-link">← All Terms</a>
    </div>

    <!-- Header -->
    <div class="page-header">
        <h1>Add New Term</h1>
        <p class="subtitle">Add a new Java term to your dictionary.</p>
    </div>

    <!-- Form -->
    <form th:action="@{/terms/create}" th:object="${createTermRequest}" method="post">

        <!-- Basic Info -->
        <div class="form-section">
            <h6 class="mb-4">Basic Information</h6>

            <div class="mb-4">
                <label class="form-label">Term Name</label>
                <input type="text"
                       class="form-control"
                       th:field="*{name}"
                       th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"
                       placeholder="e.g. Polymorphism">
                <div class="invalid-feedback"
                     th:if="${#fields.hasErrors('name')}"
                     th:errors="*{name}">
                </div>
            </div>

            <div class="mb-0">
                <label class="form-label">Experience Level</label>
                <select class="form-select"
                        th:field="*{experienceLevel}"
                        th:classappend="${#fields.hasErrors('experienceLevel')} ? 'is-invalid'">
                    <option value="">Select a level...</option>
                    <option th:each="level : ${experienceLevels}"
                            th:value="${level}"
                            th:text="${level.displayName}">
                    </option>
                </select>
                <div class="invalid-feedback"
                     th:if="${#fields.hasErrors('experienceLevel')}"
                     th:errors="*{experienceLevel}">
                </div>
            </div>
        </div>

        <!-- Definitions -->
        <div class="form-section">
            <h6 class="mb-4">Definitions</h6>

            <div class="mb-4">
                <label class="form-label">Casual Definition</label>
                <textarea class="form-control"
                          th:field="*{casualDefinition}"
                          th:classappend="${#fields.hasErrors('casualDefinition')} ? 'is-invalid'"
                          rows="4"
                          placeholder="Simple explanation in your own words...">
                </textarea>
                <div class="invalid-feedback"
                     th:if="${#fields.hasErrors('casualDefinition')}"
                     th:errors="*{casualDefinition}">
                </div>
            </div>

            <div class="mb-0">
                <label class="form-label">Formal Definition</label>
                <textarea class="form-control"
                          th:field="*{formalDefinition}"
                          th:classappend="${#fields.hasErrors('formalDefinition')} ? 'is-invalid'"
                          rows="4"
                          placeholder="Technical, interview-ready definition...">
                </textarea>
                <div class="invalid-feedback"
                     th:if="${#fields.hasErrors('formalDefinition')}"
                     th:errors="*{formalDefinition}">
                </div>
            </div>
        </div>

        <!-- Tags -->
        <div class="form-section">
            <h6 class="mb-4">Tags</h6>

            <div class="mb-2">
                <label class="form-label">Tags</label>
                <input type="text"
                       id="tagsInput"
                       class="form-control"
                       th:classappend="${#fields.hasErrors('tags')} ? 'is-invalid'"
                       placeholder="e.g. OOP, inheritance, polymorphism">
                <p class="form-text">Separate tags with commas (max 10).</p>
                <div class="invalid-feedback"
                     th:if="${#fields.hasErrors('tags')}"
                     th:errors="*{tags}">
                </div>
            </div>

            <div id="tagPreview" class="mt-2"></div>
            <div id="tagInputs"></div>
        </div>

        <!-- Actions -->
        <div class="d-flex gap-2 pt-2">
            <button type="submit" class="btn btn-primary">Save Term</button>
            <a th:href="@{/terms}" class="btn btn-outline-secondary">Cancel</a>
        </div>

    </form>

</div>

</body>
</html>
