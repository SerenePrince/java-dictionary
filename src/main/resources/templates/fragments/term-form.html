<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>

<!--
  Reusable form fields shared by create and edit.

  Parameters:
    - experienceLevels : ExperienceLevel[] — only used when showLevelSelect is true
    - currentTags      : Set<String> — the current form object's tags, passed explicitly
                         so th:value utility calls work correctly
    - showLevelSelect  : boolean — true on create (user picks a level), false on edit
                         (level is controlled by the switcher / hidden input)

  The parent template must set th:object on the enclosing <form> so that
  th:field="*{...}" expressions resolve correctly.
-->
<div th:fragment="termFormFields(experienceLevels, currentTags, showLevelSelect)">

    <!-- Basic Info -->
    <div class="form-section">
        <h6 class="mb-4">Basic Information</h6>

        <div class="mb-4">
            <label class="form-label" for="name">Term Name</label>
            <input class="form-control"
                   id="name"
                   placeholder="e.g. Polymorphism"
                   th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"
                   th:field="*{name}"
                   type="text">
            <div class="invalid-feedback"
                 th:errors="*{name}"
                 th:if="${#fields.hasErrors('name')}">
            </div>
        </div>

        <!-- Experience level select — only shown on the create form -->
        <div class="mb-0" th:if="${showLevelSelect}">
            <label class="form-label" for="experienceLevel">Experience Level</label>
            <select class="form-select"
                    id="experienceLevel"
                    th:classappend="${#fields.hasErrors('experienceLevel')} ? 'is-invalid'"
                    th:field="*{experienceLevel}">
                <option value="">Select a level...</option>
                <option th:each="level : ${experienceLevels}"
                        th:text="${level.displayName}"
                        th:value="${level}">
                </option>
            </select>
            <div class="invalid-feedback"
                 th:errors="*{experienceLevel}"
                 th:if="${#fields.hasErrors('experienceLevel')}">
            </div>
        </div>
    </div>

    <!-- Definitions -->
    <div class="form-section">
        <h6 class="mb-4">Definitions</h6>

        <div class="mb-4">
            <label class="form-label" for="casualDefinition">Casual Definition</label>
            <textarea class="form-control"
                      id="casualDefinition"
                      placeholder="Simple explanation in your own words..."
                      rows="4"
                      th:classappend="${#fields.hasErrors('casualDefinition')} ? 'is-invalid'"
                      th:field="*{casualDefinition}">
            </textarea>
            <div class="invalid-feedback"
                 th:errors="*{casualDefinition}"
                 th:if="${#fields.hasErrors('casualDefinition')}">
            </div>
        </div>

        <div class="mb-0">
            <label class="form-label" for="formalDefinition">Formal Definition</label>
            <textarea class="form-control"
                      id="formalDefinition"
                      placeholder="Technical, interview-ready definition..."
                      rows="4"
                      th:classappend="${#fields.hasErrors('formalDefinition')} ? 'is-invalid'"
                      th:field="*{formalDefinition}">
            </textarea>
            <div class="invalid-feedback"
                 th:errors="*{formalDefinition}"
                 th:if="${#fields.hasErrors('formalDefinition')}">
            </div>
        </div>
    </div>

    <!-- Tags -->
    <div class="form-section">
        <div class="mb-2">
            <label class="form-label" for="tagsInput">Tags</label>
            <input class="form-control"
                   id="tagsInput"
                   placeholder="e.g. OOP, inheritance, polymorphism"
                   th:classappend="${#fields.hasErrors('tags')} ? 'is-invalid'"
                   th:value="${currentTags != null ? #strings.listJoin(currentTags, ', ') : ''}"
                   type="text">
            <p class="form-text">Separate tags with commas (max 10).</p>
            <div class="invalid-feedback"
                 th:errors="*{tags}"
                 th:if="${#fields.hasErrors('tags')}">
            </div>
        </div>

        <div class="mt-2" id="tagPreview">
            <span class="badge me-1 mb-1"
                  th:each="tag : ${currentTags}"
                  th:text="${tag}">
            </span>
        </div>

        <div id="tagInputs">
            <input name="tags"
                   th:each="tag : ${currentTags}"
                   th:value="${tag}"
                   type="hidden">
        </div>
    </div>

</div>

</body>
</html>
